<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Préparation du tirage</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      margin:0;
      padding:16px;
      background:#f3f6f9;
      color:#0f172a;
    }
    .container{
      max-width:900px;
      margin:0 auto;
    }
    .card{
      background:#fff;
      border-radius:18px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 10px 24px rgba(15,23,42,.08);
    }
    h1,h2{margin-top:0}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:10px;
    }
    input{
      width:100%;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:12px;
      box-sizing:border-box;
      font-size:15px;
    }
    button{
      background:#0f766e;
      color:#fff;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      cursor:pointer;
      margin-top:10px;
      margin-right:8px;
    }
    button.warning{background:#dc2626}
    .link{
      word-break:break-all;
      background:#f8fafc;
      border:1px solid #cbd5e1;
      border-radius:12px;
      padding:12px;
      margin-top:10px;
    }
    .hint{color:#475569;font-size:14px}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Admin — Préparation du tirage</h1>
      <p class="hint">Cette page sert uniquement à préparer le tirage et à réinitialiser.</p>
      <div class="link">
        Public : <strong id="publicLink"></strong><br>
        JAT : <strong id="jatLink"></strong>
      </div>
    </div>

    <div class="card">
      <h2>Habillage</h2>
      <div class="grid">
        <input id="eventTitle" value="Championnat de Guyane" placeholder="Titre">
        <input id="eventSubtitle" value="Tirage officiel des poules" placeholder="Sous-titre">
        <input id="eventCategory" value="Beach Tennis" placeholder="Discipline">
        <input id="eventDate" value="Mars 2026" placeholder="Date / lieu">
      </div>
    </div>

    <div class="card">
      <h2>Têtes de série</h2>
      <div class="grid">
        <input id="ts1" placeholder="Tête de série 1 → Poule A">
        <input id="ts2" placeholder="Tête de série 2 → Poule B">
        <input id="ts3" placeholder="Tête de série 3 → Poule C">
      </div>
    </div>

    <div class="card">
      <h2>Équipes à tirer</h2>
      <div class="grid">
        <input class="team" placeholder="Équipe 1">
        <input class="team" placeholder="Équipe 2">
        <input class="team" placeholder="Équipe 3">
        <input class="team" placeholder="Équipe 4">
        <input class="team" placeholder="Équipe 5">
        <input class="team" placeholder="Équipe 6">
      </div>

      <button id="prepareBtn">Préparer le tirage</button>
      <button id="resetBtn" class="warning">Réinitialiser</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBeLh-JXNithWyTut5dWMCYLn_tO_FsgjQ",
      authDomain: "tirage-ligue-equipes.firebaseapp.com",
      databaseURL: "https://tirage-ligue-equipes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "tirage-ligue-equipes",
      storageBucket: "tirage-ligue-equipes.firebasestorage.app",
      messagingSenderId: "801813158938",
      appId: "1:801813158938:web:de76fb9b7758249c5a85a3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tirageRef = ref(db, "tirage");

    const baseUrl = `${window.location.origin}${window.location.pathname.replace("index.html", "")}`;
    document.getElementById("publicLink").textContent = baseUrl + "public.html";
    document.getElementById("jatLink").textContent = baseUrl + "jat.html";

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    document.getElementById("prepareBtn").addEventListener("click", async () => {
      const title = document.getElementById("eventTitle").value.trim();
      const subtitle = document.getElementById("eventSubtitle").value.trim();
      const category = document.getElementById("eventCategory").value.trim();
      const dateLabel = document.getElementById("eventDate").value.trim();

      const ts1 = document.getElementById("ts1").value.trim();
      const ts2 = document.getElementById("ts2").value.trim();
      const ts3 = document.getElementById("ts3").value.trim();

      const teams = [...document.querySelectorAll(".team")].map(x => x.value.trim()).filter(Boolean);

      if (!ts1 || !ts2 || !ts3) {
        alert("Merci de renseigner les 3 têtes de série.");
        return;
      }
      if (teams.length !== 6) {
        alert("Merci de renseigner exactement 6 équipes.");
        return;
      }

      const ordreTirage = shuffle(teams);

      await set(tirageRef, {
        status: "prepared",
        title,
        subtitle,
        category,
        dateLabel,
        ts: [ts1, ts2, ts3],
        ordreTirage,
        currentIndex: 0,
        currentTeam: "",
        phase: "idle",
        displayedPoules: {
          pouleA: [ts1],
          pouleB: [ts2],
          pouleC: [ts3]
        },
        logs: [],
        validated: false,
        validatedAt: null
      });

      alert("Tirage préparé.");
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      await set(tirageRef, {
        status: "waiting",
        title: "Championnat de Guyane",
        subtitle: "Tirage officiel des poules",
        category: "Beach Tennis",
        dateLabel: "Mars 2026",
        ts: [],
        ordreTirage: [],
        currentIndex: 0,
        currentTeam: "",
        phase: "idle",
        displayedPoules: {
          pouleA: [],
          pouleB: [],
          pouleC: []
        },
        logs: [],
        validated: false,
        validatedAt: null
      });

      alert("Tirage réinitialisé.");
    });
  </script>
</body>
</html>
