<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JAT - Tirage officiel</title>
  <style>
    :root{
      --gold:#facc15;
      --gold-soft:#fde68a;
      --sea:#14b8a6;
      --sea-soft:#5eead4;
      --border:rgba(255,255,255,.14);
      --glass:rgba(255,255,255,.08);
      --shadow:0 10px 24px rgba(0,0,0,.28);
      --bg1:#132238;
      --bg2:#0f172a;
      --bg3:#0b1120;
    }
    *{ box-sizing:border-box; }
    html, body{
      margin:0; padding:0; width:100%; overflow-x:hidden;
    }
    body{
      font-family:Arial,sans-serif;
      color:white;
      background:
        radial-gradient(circle at top, rgba(20,184,166,.18), transparent 24%),
        radial-gradient(circle at bottom, rgba(250,204,21,.08), transparent 24%),
        linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 45%,var(--bg3) 100%);
      min-height:100vh;
      padding:10px;
    }
    .container{ width:100%; max-width:520px; margin:0 auto; }
    .hero,.card,.poule{
      width:100%;
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .hero{ padding:12px; margin-bottom:10px; }
    .hero-top{
      display:grid;
      grid-template-columns:72px 1fr 72px;
      align-items:center;
      gap:8px;
      margin-bottom:8px;
    }
    .hero-logo{
      width:72px; height:72px; display:flex; align-items:center; justify-content:center;
    }
    .hero-logo img{
      max-width:68px; max-height:68px; width:auto; height:auto; object-fit:contain; display:block;
    }
    .hero-title{text-align:center;min-width:0;}
    .hero-title h1{
      margin:0; font-size:clamp(18px, 6.1vw, 27px); line-height:1.05; font-weight:800; word-break:break-word;
    }
    .hero-subline{
      display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:nowrap; min-width:0;
    }
    .subtitle{
      font-size:clamp(12px, 3.4vw, 15px); line-height:1.15; color:#e2e8f0;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;
    }
    .category{
      flex:0 0 auto; display:inline-block; background:linear-gradient(135deg,var(--gold),var(--gold-soft));
      color:#111827; padding:5px 10px; border-radius:999px; font-weight:bold; font-size:12px; white-space:nowrap;
    }
    .date{
      margin-top:6px; text-align:center; color:#cbd5e1; font-size:11px; line-height:1.2; word-break:break-word;
    }
    .card{ padding:14px 12px; margin-bottom:10px; text-align:center; }
    .section-title{ font-size:17px; font-weight:700; margin:0 0 6px; color:#f8fafc; }
    .waiting{ font-size:18px; color:#e2e8f0; line-height:1.35; }
    .validation{
      margin-top:8px;
      color:#fde68a;
      font-weight:bold;
      font-size:14px;
    }
    .roulette-stage{
      margin:8px auto 0; width:100%; padding:10px; border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.12);
    }
    .roulette-title{
      color:#cbd5e1; margin-bottom:8px; font-size:11px; text-transform:uppercase; letter-spacing:2px;
    }
    .roulette-window{
      position:relative; min-height:86px; border-radius:16px; display:flex; align-items:center; justify-content:center;
      padding:10px 12px;
      background:radial-gradient(circle at center, rgba(20,184,166,.14), transparent 36%),
      linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.12); overflow:hidden;
    }
    .roulette-window::before,
    .roulette-window::after{
      content:""; position:absolute; top:10px; bottom:10px; width:4px; border-radius:999px;
      background:linear-gradient(180deg,var(--gold),var(--sea-soft)); opacity:.9;
    }
    .roulette-window::before{ left:10px; }
    .roulette-window::after{ right:10px; }
    .roulette{
      font-size:clamp(24px, 7vw, 34px); font-weight:800; color:var(--gold);
      text-shadow:0 0 18px rgba(250,204,21,.22); line-height:1.08; word-break:break-word; max-width:88%; text-align:center;
    }
    .roulette-placeholder{ color:#94a3b8; font-size:18px; font-weight:bold; }
    .actions{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .btn{
      background:linear-gradient(135deg,var(--gold),var(--gold-soft));
      color:#111827;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      cursor:pointer;
      font-weight:bold;
      width:100%;
    }
    .btn.secondary{
      background:linear-gradient(135deg,#34d399,#6ee7b7);
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .poules{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      width:100%;
      margin-top:0;
    }
    .poule{
      position:relative; overflow:hidden; padding:12px 12px 10px;
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.06));
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .poule.active{
      transform:translateY(-2px);
      box-shadow:0 0 0 1px rgba(250,204,21,.28), 0 12px 24px rgba(0,0,0,.24);
    }
    .poule::before{
      content:""; position:absolute; top:0; left:0; right:0; height:5px;
      background:linear-gradient(90deg,var(--gold),var(--sea));
    }
    .poule h2{
      text-align:center; margin:2px 0 4px; font-size:24px; color:#f8fafc; line-height:1.1;
    }
    .poule-sub{
      text-align:center; color:#cbd5e1; font-size:10px; text-transform:uppercase; letter-spacing:2px; margin-bottom:6px;
    }
    ul{ padding-left:20px; margin:0; font-size:17px; line-height:1.55; }
    li{ margin-bottom:2px; word-break:break-word; }
    li:first-child{ color:#fde68a; font-weight:bold; }
    li.new-entry{ animation:popIn .55s ease; color:#fff; font-weight:bold; }
    @keyframes popIn{
      0%{ transform:scale(.92); opacity:.2; }
      60%{ transform:scale(1.04); opacity:1; }
      100%{ transform:scale(1); }
    }
    .footer{
      margin-top:10px; text-align:center; color:#cbd5e1; font-size:11px; line-height:1.2; padding-bottom:4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-top">
        <div class="hero-logo"><img src="assets/ligue.png" alt="Logo Ligue"></div>
        <div class="hero-title"><h1 id="heroTitle">Championnat de Guyane</h1></div>
        <div class="hero-logo"><img src="assets/beach.png" alt="Logo Beach"></div>
      </div>
      <div class="hero-subline">
        <div id="heroSubtitle" class="subtitle">Tirage officiel des poules</div>
        <div id="heroCategory" class="category">Beach Tennis</div>
      </div>
      <div id="heroDate" class="date">Mars 2026</div>
    </div>

    <div class="card">
      <div id="statusArea" class="waiting">Chargement…</div>
      <div id="validationText" class="validation"></div>

      <div class="roulette-stage">
        <div class="roulette-title">Roulette du tirage</div>
        <div class="roulette-window">
          <div id="roulette" class="roulette roulette-placeholder">En attente du tirage</div>
        </div>
      </div>

      <div class="actions">
        <button id="nextBtn" class="btn">Tirage suivant</button>
        <button id="validateBtn" class="btn secondary">Validation</button>
      </div>
    </div>

    <div class="poules">
      <div class="poule" id="boxA">
        <div class="poule-sub">Beach Tennis</div>
        <h2>Poule A</h2>
        <ul id="p1"></ul>
      </div>
      <div class="poule" id="boxB">
        <div class="poule-sub">Beach Tennis</div>
        <h2>Poule B</h2>
        <ul id="p2"></ul>
      </div>
      <div class="poule" id="boxC">
        <div class="poule-sub">Beach Tennis</div>
        <h2>Poule C</h2>
        <ul id="p3"></ul>
      </div>
    </div>

    <div class="footer">Page JAT</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBeLh-JXNithWyTut5dWMCYLn_tO_FsgjQ",
      authDomain: "tirage-ligue-equipes.firebaseapp.com",
      databaseURL: "https://tirage-ligue-equipes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "tirage-ligue-equipes",
      storageBucket: "tirage-ligue-equipes.firebasestorage.app",
      messagingSenderId: "801813158938",
      appId: "1:801813158938:web:de76fb9b7758249c5a85a3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tirageRef = ref(db, "tirage");

    const statusArea = document.getElementById("statusArea");
    const validationText = document.getElementById("validationText");
    const roulette = document.getElementById("roulette");
    const nextBtn = document.getElementById("nextBtn");
    const validateBtn = document.getElementById("validateBtn");

    let latestData = null;
    let rouletteInterval = null;
    let busy = false;
    let lastRenderedDisplayed = "";

    function updateHeader(data) {
      document.getElementById("heroTitle").textContent = data?.title || "Championnat de Guyane";
      document.getElementById("heroSubtitle").textContent = data?.subtitle || "Tirage officiel des poules";
      document.getElementById("heroCategory").textContent = data?.category || "Beach Tennis";
      document.getElementById("heroDate").textContent = data?.dateLabel || "";
    }

    function getPouleLetter(index) {
      return ["A", "B", "C"][index % 3];
    }

    function highlightPoule(letter) {
      ["A","B","C"].forEach(l => {
        document.getElementById("box" + l).classList.toggle("active", l === letter);
      });
    }

    function clearPouleHighlights() {
      ["A","B","C"].forEach(l => document.getElementById("box" + l).classList.remove("active"));
    }

    function renderPoules(data, animateNew = false) {
      const displayed = data?.displayedPoules || {};
      const sig = JSON.stringify(displayed);
      const changed = sig !== lastRenderedDisplayed;
      lastRenderedDisplayed = sig;

      const map = [
        ["p1", displayed.pouleA || []],
        ["p2", displayed.pouleB || []],
        ["p3", displayed.pouleC || []]
      ];

      map.forEach(([id, arr]) => {
        const el = document.getElementById(id);
        el.innerHTML = "";
        arr.forEach((team, idx) => {
          const isLast = idx === arr.length - 1;
          const liClass = animateNew && changed && isLast && idx > 0 ? ' class="new-entry"' : "";
          el.innerHTML += `<li${liClass}>${team}</li>`;
        });
      });
    }

    function setRouletteText(text, placeholder = false) {
      roulette.textContent = text;
      roulette.classList.toggle("roulette-placeholder", placeholder);
    }

    function startRouletteLoop(list) {
      stopRouletteLoop();
      roulette.classList.remove("roulette-placeholder");
      let idx = 0;
      rouletteInterval = setInterval(() => {
        roulette.textContent = list[idx % list.length];
        idx++;
      }, 90);
    }

    function stopRouletteLoop() {
      if (rouletteInterval) clearInterval(rouletteInterval);
      rouletteInterval = null;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function formatDateTime(isoString) {
      if (!isoString) return "";
      const d = new Date(isoString);
      return d.toLocaleString("fr-FR");
    }

    nextBtn.addEventListener("click", async () => {
      if (busy) return;
      const snap = await get(tirageRef);
      if (!snap.exists()) return;
      const data = snap.val();

      if (data.status !== "prepared" && data.status !== "running") {
        alert("Le tirage n'est pas prêt.");
        return;
      }

      if ((data.currentIndex || 0) >= (data.ordreTirage || []).length) {
        alert("Toutes les équipes ont déjà été tirées.");
        return;
      }

      busy = true;
      nextBtn.disabled = true;
      validateBtn.disabled = true;

      const i = data.currentIndex || 0;
      const team = data.ordreTirage[i];
      const pouleLetter = getPouleLetter(i);
      const key = "poule" + pouleLetter;

      await update(tirageRef, {
        status: "running",
        phase: "animating",
        currentIndex: i,
        currentTeam: ""
      });

      await sleep(1500);

      const displayedPoules = data.displayedPoules || { pouleA: [], pouleB: [], pouleC: [] };
      displayedPoules[key] = [...(displayedPoules[key] || []), team];

      const logs = [...(data.logs || []), {
        index: i,
        team,
        poule: pouleLetter
      }];

      await update(tirageRef, {
        status: "running",
        phase: "revealed",
        currentIndex: i + 1,
        currentTeam: team,
        displayedPoules,
        logs
      });

      busy = false;
      nextBtn.disabled = false;
      validateBtn.disabled = false;
    });

    validateBtn.addEventListener("click", async () => {
      if (busy) return;
      const now = new Date().toISOString();
      await update(tirageRef, {
        status: "validated",
        validated: true,
        validatedAt: now,
        phase: "validated"
      });
    });

    onValue(tirageRef, (snapshot) => {
      const data = snapshot.val();
      latestData = data;
      updateHeader(data);

      if (!data || data.status === "waiting") {
        statusArea.textContent = "Le tirage n'a pas encore été préparé.";
        validationText.textContent = "";
        setRouletteText("En attente du tirage", true);
        renderPoules(data, false);
        nextBtn.disabled = true;
        validateBtn.disabled = true;
        clearPouleHighlights();
        return;
      }

      renderPoules(data, data.phase === "revealed");

      if (data.status === "prepared") {
        statusArea.textContent = "Tirage prêt. Clique sur “Tirage suivant”.";
        validationText.textContent = "";
        setRouletteText("Prêt pour le premier tirage", true);
        nextBtn.disabled = false;
        validateBtn.disabled = false;
        clearPouleHighlights();
        return;
      }

      if (data.status === "running") {
        const idx = Math.max(0, (data.currentIndex || 0));
        const targetIndex = data.phase === "animating" ? idx : Math.max(0, idx - 1);
        const letter = getPouleLetter(targetIndex);
        highlightPoule(letter);

        if (data.phase === "animating") {
          statusArea.textContent = "Tirage en cours…";
          validationText.textContent = "";
          startRouletteLoop(data.ordreTirage || []);
          return;
        }

        if (data.phase === "revealed") {
          stopRouletteLoop();
          statusArea.textContent = "Équipe ajoutée. Clique sur “Tirage suivant”.";
          validationText.textContent = "";
          setRouletteText(data.currentTeam || "—", false);
          return;
        }
      }

      if (data.status === "validated") {
        stopRouletteLoop();
        clearPouleHighlights();
        statusArea.textContent = "Tirage validé";
        validationText.textContent = `Validation : ${formatDateTime(data.validatedAt)}`;
        setRouletteText("Tirage validé", true);
        nextBtn.disabled = true;
        validateBtn.disabled = true;
      }
    });
  </script>
</body>
</html>
