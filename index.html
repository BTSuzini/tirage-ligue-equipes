<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Tirage des poules</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      margin:0;
      padding:20px;
      background:linear-gradient(180deg,#f8fafc,#e2e8f0);
      color:#0f172a;
    }
    .container{
      max-width:1100px;
      margin:0 auto;
    }
    .card{
      background:#fff;
      border-radius:18px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:0 10px 24px rgba(15,23,42,.08);
    }
    h1,h2,h3{margin-top:0}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
    }
    input{
      width:100%;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:12px;
      box-sizing:border-box;
      font-size:15px;
    }
    button{
      background:#0f766e;
      color:#fff;
      border:none;
      border-radius:12px;
      padding:14px 18px;
      font-size:16px;
      cursor:pointer;
      margin-top:12px;
      margin-right:8px;
    }
    button.secondary{background:#1d4ed8}
    button.warning{background:#dc2626}
    .result{
      margin-top:20px;
      padding:16px;
      border-radius:14px;
      background:#ecfeff;
      border:1px solid #a5f3fc;
    }
    .link-box{
      word-break:break-all;
      background:#f8fafc;
      border:1px solid #cbd5e1;
      border-radius:12px;
      padding:12px;
      margin-top:12px;
    }
    .hidden{display:none}
    .meta{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:12px;
    }
    .hint{
      color:#475569;
      font-size:14px;
      margin-top:6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Admin — Tirage live</h1>
      <p>Prépare le tirage, partage la page publique, puis lance le direct.</p>
      <div class="link-box">
        Lien public à partager :<br>
        <strong id="publicLink"></strong>
      </div>
    </div>

    <div class="card">
      <h2>Habillage officiel</h2>
      <div class="meta">
        <input id="eventTitle" placeholder="Titre de l'événement" value="Championnat de Guyane">
        <input id="eventSubtitle" placeholder="Sous-titre" value="Tirage officiel des poules">
        <input id="eventCategory" placeholder="Discipline" value="Beach Tennis">
        <input id="eventDate" placeholder="Date / lieu" value="Mars 2026">
        <input id="countdownSeconds" type="number" placeholder="Compte à rebours (secondes)" value="10">
      </div>
      <div class="hint">Le public verra ces informations avant et pendant le tirage.</div>
    </div>

    <div class="card">
      <h2>Têtes de série</h2>
      <div class="grid">
        <input id="ts1" placeholder="Tête de série 1 → Poule A">
        <input id="ts2" placeholder="Tête de série 2 → Poule B">
        <input id="ts3" placeholder="Tête de série 3 → Poule C">
      </div>
    </div>

    <div class="card">
      <h2>Équipes à tirer</h2>
      <div class="grid">
        <input class="team" placeholder="Équipe 1">
        <input class="team" placeholder="Équipe 2">
        <input class="team" placeholder="Équipe 3">
        <input class="team" placeholder="Équipe 4">
        <input class="team" placeholder="Équipe 5">
        <input class="team" placeholder="Équipe 6">
      </div>

      <button id="prepareBtn">Préparer le tirage</button>
      <button id="startBtn" class="secondary">Lancer le direct</button>
      <button id="resetBtn" class="warning">Réinitialiser</button>

      <div id="resultBox" class="result hidden"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      update,
      get
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBeLh-JXNithWyTut5dWMCYLn_tO_FsgjQ",
      authDomain: "tirage-ligue-equipes.firebaseapp.com",
      databaseURL: "https://tirage-ligue-equipes-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "tirage-ligue-equipes",
      storageBucket: "tirage-ligue-equipes.firebasestorage.app",
      messagingSenderId: "801813158938",
      appId: "1:801813158938:web:de76fb9b7758249c5a85a3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tirageRef = ref(db, "tirage");

    const publicUrl = `${window.location.origin}${window.location.pathname.replace("index.html", "")}public.html`;
    document.getElementById("publicLink").textContent = publicUrl;

    let tirageData = null;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function buildTirage() {
      const title = document.getElementById("eventTitle").value.trim();
      const subtitle = document.getElementById("eventSubtitle").value.trim();
      const category = document.getElementById("eventCategory").value.trim();
      const dateLabel = document.getElementById("eventDate").value.trim();
      const countdownSeconds = parseInt(document.getElementById("countdownSeconds").value || "10", 10);

      const ts1 = document.getElementById("ts1").value.trim();
      const ts2 = document.getElementById("ts2").value.trim();
      const ts3 = document.getElementById("ts3").value.trim();

      const teams = [...document.querySelectorAll(".team")]
        .map(el => el.value.trim())
        .filter(Boolean);

      if (!ts1 || !ts2 || !ts3) {
        alert("Merci de renseigner les 3 têtes de série.");
        return null;
      }

      if (teams.length !== 6) {
        alert("Merci de renseigner exactement 6 équipes.");
        return null;
      }

      const ordreTirage = shuffle(teams);
      const pouleA = [ts1];
      const pouleB = [ts2];
      const pouleC = [ts3];

      ordreTirage.forEach((team, i) => {
        if (i % 3 === 0) pouleA.push(team);
        else if (i % 3 === 1) pouleB.push(team);
        else pouleC.push(team);
      });

      return {
        status: "ready",
        currentIndex: -1,
        currentTeam: "",
        countdownSeconds,
        title,
        subtitle,
        category,
        dateLabel,
        startedAt: Date.now(),
        countdownStartAt: null,
        ts: [ts1, ts2, ts3],
        ordreTirage,
        poules: { pouleA, pouleB, pouleC }
      };
    }

    function showResult(data) {
      const box = document.getElementById("resultBox");
      box.innerHTML = `
        <p><strong>Ordre du tirage :</strong> ${data.ordreTirage.join(" → ")}</p>
        <p><strong>Poule A :</strong> ${data.poules.pouleA.join(" / ")}</p>
        <p><strong>Poule B :</strong> ${data.poules.pouleB.join(" / ")}</p>
        <p><strong>Poule C :</strong> ${data.poules.pouleC.join(" / ")}</p>
      `;
      box.classList.remove("hidden");
    }

    document.getElementById("prepareBtn").addEventListener("click", async () => {
      const data = buildTirage();
      if (!data) return;

      tirageData = data;
      await set(tirageRef, data);
      showResult(data);
      alert("Tirage préparé.");
    });

    document.getElementById("startBtn").addEventListener("click", async () => {
      if (!tirageData) {
        const snap = await get(tirageRef);
        if (snap.exists()) tirageData = snap.val();
      }

      if (!tirageData || !tirageData.ordreTirage) {
        alert("Prépare d'abord le tirage.");
        return;
      }

      const countdownStartAt = Date.now();

      await update(tirageRef, {
        status: "countdown",
        countdownStartAt,
        currentIndex: -1,
        currentTeam: ""
      });

      await sleep((tirageData.countdownSeconds || 10) * 1000);

      await update(tirageRef, {
        status: "live",
        currentIndex: -1,
        currentTeam: ""
      });

      for (let i = 0; i < tirageData.ordreTirage.length; i++) {
        const team = tirageData.ordreTirage[i];

        await update(tirageRef, {
          status: "live",
          currentIndex: i,
          currentTeam: team
        });

        await sleep(2600);
      }

      await update(tirageRef, {
        status: "finished",
        currentTeam: "",
        currentIndex: tirageData.ordreTirage.length - 1
      });

      alert("Tirage terminé.");
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      await set(tirageRef, {
        status: "waiting",
        message: "Le tirage n'a pas encore commencé.",
        title: "Championnat de Guyane",
        subtitle: "Tirage officiel des poules",
        category: "Beach Tennis",
        dateLabel: "Mars 2026"
      });
      tirageData = null;
      document.getElementById("resultBox").classList.add("hidden");
      alert("Tirage réinitialisé.");
    });

    async function init() {
      const snap = await get(tirageRef);
      if (!snap.exists()) {
        await set(tirageRef, {
          status: "waiting",
          message: "Le tirage n'a pas encore commencé.",
          title: "Championnat de Guyane",
          subtitle: "Tirage officiel des poules",
          category: "Beach Tennis",
          dateLabel: "Mars 2026"
        });
      }
    }

    init();
  </script>
</body>
</html>
